services:
  # --- Контейнер с MySQL ---
  mysql:
    image: mysql:8.0
    container_name: diplom-mysql
    # Переменные окружения для настройки БД
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: yes
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: pass
    # Проброс портов: "порт_на_хосте:порт_в_контейнере"
    ports:
      - "3306:3306"
    # Добавляем healthcheck для проверки готовности MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-ppass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Контейнер с PostgreSQL ---
  postgres:
    image: postgres:14-alpine
    container_name: diplom-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    # Добавляем healthcheck для проверки готовности PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Контейнер с эмулятором банковских сервисов (Node.js) ---
  node-app:
    build:
      # Dockerfile для gate simulator
      context: ./gate-simulator
    container_name: diplom-node-app
    ports:
      - "9999:9999"
    # Добавляем healthcheck для проверки готовности Node.js приложения
